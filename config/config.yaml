# TrendRadar 配置文件（为“商业机会研究”定制）

app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: true
  preset: "custom"

platforms:
  enabled: true
  sources:
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻 最热"
    - id: "wallstreetcn-news"
      name: "华尔街见闻 最新"
    - id: "hackernews"
      name: "Hacker News"
    - id: "github"
      name: "GitHub"
    - id: "sspai"
      name: "少数派"
    - id: "douyin"
      name: "抖音"

rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 2
  feeds:
    - id: "hacker-news"
      name: "Hacker News"
      url: "https://hnrss.org/frontpage"
    - id: "yahoo-finance"
      name: "Yahoo Finance"
      url: "https://finance.yahoo.com/news/rssindex"
    - id: "bbc-business"
      name: "BBC Business"
      url: "https://feeds.bbci.co.uk/news/business/rss.xml"
    - id: "bbc-technology"
      name: "BBC Technology"
      url: "https://feeds.bbci.co.uk/news/technology/rss.xml"
    - id: "bbc-world"
      name: "BBC World"
      url: "https://feeds.bbci.co.uk/news/world/rss.xml"

report:
  mode: "incremental"
  display_mode: "keyword"
  sort_by_position_first: true
  rank_threshold: 20
  max_news_per_keyword: 5

filter:
  method: "ai"
  priority_sort_enabled: true

ai_filter:
  batch_size: 120
  batch_interval: 2
  min_score: 0.72
  reclassify_threshold: 0.45
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

display:
  region_order:
    - ai_analysis
    - hotlist
    - rss
    - standalone
    - new_items
  regions:
    hotlist: true
    new_items: true
    rss: true
    standalone: true
    ai_analysis: true
  standalone:
    platforms:
      - "cls-hot"
      - "wallstreetcn-hot"
      - "hackernews"
    rss_feeds:
      - "yahoo-finance"
      - "bbc-business"
      - "bbc-technology"
    max_items: 8

notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    telegram:
      bot_token: ""
      chat_id: ""
    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""
    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""
    bark:
      url: "https://api.day.app/znFz8wiS24ABuPLatJqGJW"
    slack:
      webhook_url: ""
    generic_webhook:
      webhook_url: ""
      payload_template: ""

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
  retention:
    days: 30

ai:
  model: "deepseek/deepseek-chat"
  api_key: "sk-1b1799a2815945078c7659a2b7b671d2"
  api_base: ""
  timeout: 120
  temperature: 0.3
  max_tokens: 4000
  num_retries: 1
  fallback_models: []

ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 80
  include_rss: true
  include_standalone: true
  include_rank_timeline: true

ai_translation:
  enabled: false
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  scope:
    hotlist: false
    rss: false
    standalone: false

advanced:
  debug: false
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.3
    frequency: 0.6
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
