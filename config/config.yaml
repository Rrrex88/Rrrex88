app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: false
  preset: "morning_evening"

platforms:
  enabled: true
  sources:
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻 最热"
    - id: "wallstreetcn-news"
      name: "华尔街见闻 最新"
    - id: "hackernews"
      name: "Hacker News"
    - id: "github"
      name: "GitHub"
    - id: "sspai"
      name: "少数派"
    - id: "douyin"
      name: "抖音"

rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 2
  feeds:
    - id: "hacker-news"
      name: "Hacker News"
      url: "https://hnrss.org/frontpage"

    - id: "yahoo-finance"
      name: "雅虎财经"
      url: "https://finance.yahoo.com/news/rssindex"

    - id: "bbc-world"
      name: "BBC World"
      url: "https://feeds.bbci.co.uk/news/world/rss.xml"

    - id: "bbc-business"
      name: "BBC Business"
      url: "https://feeds.bbci.co.uk/news/business/rss.xml"

    - id: "bbc-technology"
      name: "BBC Technology"
      url: "https://feeds.bbci.co.uk/news/technology/rss.xml"

report:
  mode: "incremental"
  display_mode: "keyword"
  sort_by_position_first: false
  rank_threshold: 20
  max_news_per_keyword: 5

filter:
  method: "ai"
  priority_sort_enabled: true

ai_filter:
  batch_size: 150
  batch_interval: 2
  min_score: 0.65
  reclassify_threshold: 0.5
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

display:
  region_order:
    - ai_analysis
    - hotlist
    - new_items
  regions:
    hotlist: true
    new_items: true
    rss: false
    standalone: false
    ai_analysis: true
  standalone:
    platforms: []
    rss_feeds: []
    max_items: 10

notification:
  enabled: false
  channels:
    feishu:
      webhook_url: ""

    dingtalk:
      webhook_url: ""

    wework:
      webhook_url: ""
      msg_type: "markdown"

    telegram:
      bot_token: ""
      chat_id: ""

    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""

    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""

    bark:
      url: ""

    slack:
      webhook_url: ""

    generic_webhook:
      webhook_url: ""
      payload_template: ""

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 180
  remote:
    retention_days: 180
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""
  pull:
    enabled: false
    days: 30

ai:
  model: "deepseek/deepseek-chat"
  api_key: ""
  api_base: ""
  timeout: 120
  temperature: 0.3
  max_tokens: 4000
  num_retries: 1
  fallback_models: []

ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 100
  include_rss: true
  include_standalone: false
  include_rank_timeline: false

ai_translation:
  enabled: false
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  scope:
    hotlist: false
    rss: false
    standalone: false

advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"

  crawler:
    request_i_
