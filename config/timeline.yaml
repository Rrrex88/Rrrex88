# TrendRadar 时间线配置（为“商业机会研究”定制）
# 说明：
# - 你的目标不是刷屏，而是稳定收集 + 分时段提炼
# - 默认静默期只采集，不推送，避免噪音
# - 重点时段做“机会扫描”和“深度汇总”

presets:
  always_on:
    name: "全天监控"
    description: "全天候监控，有新增立即推送。"
    default:
      collect: true
      analyze: false
      ai_mode: "current"
      push: true
      report_mode: "incremental"
      once:
        analyze: false
        push: false
    periods: {}
    day_plans:
      all_day:
        periods: []
    week_map:
      1: "all_day"
      2: "all_day"
      3: "all_day"
      4: "all_day"
      5: "all_day"
      6: "all_day"
      7: "all_day"

  morning_evening:
    name: "早晚汇总"
    description: "全天推送 + 晚间当日汇总。"
    default:
      collect: true
      analyze: true
      ai_mode: "current"
      push: true
      report_mode: "current"
      once:
        analyze: false
        push: false
    periods:
      evening_summary:
        name: "晚间汇总"
        start: "20:00"
        end: "22:00"
        analyze: true
        ai_mode: "daily"
        report_mode: "daily"
        once:
          analyze: true
          push: true
    day_plans:
      all_day:
        periods: ["evening_summary"]
    week_map:
      1: "all_day"
      2: "all_day"
      3: "all_day"
      4: "all_day"
      5: "all_day"
      6: "all_day"
      7: "all_day"

custom:
  name: "商业机会研究模式"
  description: "围绕赚钱机会、世界变化和高杠杆工具的三段式研究流程。"

  default:
    collect: true
    analyze: false
    ai_mode: "current"
    push: false
    report_mode: "incremental"
    filter_method: "ai"
    once:
      analyze: true
      push: true

  periods:
    morning_scan:
      name: "晨间机会扫描"
      start: "08:30"
      end: "09:30"
      analyze: true
      ai_mode: "current"
      push: true
      report_mode: "current"
      filter_method: "ai"
      once:
        analyze: true
        push: true

    noon_check:
      name: "午间变化检查"
      start: "12:30"
      end: "13:30"
      analyze: false
      push: true
      report_mode: "incremental"
      filter_method: "ai"
      once:
        analyze: false
        push: true

    evening_deep_dive:
      name: "晚间深度汇总"
      start: "20:30"
      end: "22:00"
      analyze: true
      ai_mode: "daily"
      push: true
      report_mode: "daily"
      filter_method: "ai"
      once:
        analyze: true
        push: true

    weekend_brief:
      name: "周末商业简报"
      start: "10:00"
      end: "11:30"
      analyze: true
      ai_mode: "current"
      push: true
      report_mode: "current"
      filter_method: "ai"
      once:
        analyze: true
        push: true

    weekend_deep_dive:
      name: "周末深度汇总"
      start: "20:00"
      end: "21:30"
      analyze: true
      ai_mode: "daily"
      push: true
      report_mode: "daily"
      filter_method: "ai"
      once:
        analyze: true
        push: true

  day_plans:
    workday:
      periods: ["morning_scan", "noon_check", "evening_deep_dive"]
    weekend:
      periods: ["weekend_brief", "weekend_deep_dive"]

  week_map:
    1: "workday"
    2: "workday"
    3: "workday"
    4: "workday"
    5: "workday"
    6: "weekend"
    7: "weekend"

  overlap:
    policy: "error_on_overlap"
